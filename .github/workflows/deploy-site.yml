name: Deploy Site

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        # enablement: true self-bootstraps Pages (Source = GitHub Actions) on the
        # first run, so no manual repo-settings step is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: site
      - name: Build
        run: npm run build
        working-directory: site
        env:
          # Project page at <owner>.github.io/nit/ needs base "/nit/".
          # If a custom domain (e.g. nit.dev) is added later: set this to "/"
          # and add site/public/CNAME. The base is env-driven in config.mts.
          VITEPRESS_BASE: /nit/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

